databases:
  - name: ball2ball-postgres
    plan: free

services:
  - type: web
    name: ball2ball
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ball2ball-postgres
          property: connectionString
