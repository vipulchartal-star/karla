databases:
  - name: cricket-prediction-postgres
    plan: free

services:
  - type: web
    name: cricket-prediction-market
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cricket-prediction-postgres
          property: connectionString
