<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>BTC Stream</title>
  <style>
    :root {
      --bg: #08111f;
      --card: rgba(12, 19, 33, 0.92);
      --card-2: rgba(255, 255, 255, 0.04);
      --border: rgba(148, 163, 184, 0.18);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --good: #22c55e;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(245, 158, 11, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.12), transparent 24%),
        linear-gradient(180deg, #08111f 0%, #050816 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .shell {
      width: min(560px, 100%);
    }

    .hero {
      margin-bottom: 14px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .eyebrow .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--good);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
    }

    h1 {
      margin: 14px 0 6px;
      font-size: clamp(2rem, 6vw, 3.25rem);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(18px);
    }

    .price {
      margin-top: 12px;
      padding: 18px 16px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--card-2);
    }

    .price-value {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: clamp(2.2rem, 9vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .meta {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      font-size: 13px;
    }

    .pill strong {
      color: var(--text);
    }

    .footer {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="hero">
      <div class="eyebrow"><span class="dot"></span> Public BTC stream</div>
      <h1>Bitcoin price, live.</h1>
      <p>Free public price pages. No API key needed for this demo stream.</p>
    </div>

    <section class="card">
      <div class="price">
        <div class="price-value" id="price">Loading...</div>
        <div class="meta">
          <div class="pill">Pair <strong>BTC-USD</strong></div>
          <div class="pill">Status <strong id="status">loading</strong></div>
        </div>
      </div>
      <div class="footer" id="details">
        Waiting for a live quote from the public price pages.
      </div>
      <div class="footer">
        Sources: <a href="https://www.coinbase.com/converter/btc/usd" target="_blank" rel="noreferrer">Coinbase converter</a> and <a href="https://finance.yahoo.com/crypto/" target="_blank" rel="noreferrer">Yahoo Finance crypto</a>
      </div>
    </section>
  </main>

  <script>
    const priceEl = document.getElementById("price");
    const statusEl = document.getElementById("status");
    const detailsEl = document.getElementById("details");

    let refreshTimer = null;
    let started = false;

    function setStatus(status) {
      statusEl.textContent = status;
    }

    function formatPrice(value) {
      const amount = Number(value);
      if (!Number.isFinite(amount)) {
        return value;
      }
      return `$${amount.toLocaleString(undefined, { maximumFractionDigits: 2 })}`;
    }

    async function refreshPrice() {
      try {
        const response = await fetch("/btc-price.json", { cache: "no-store" });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || `Request failed with status ${response.status}`);
        }

        priceEl.textContent = formatPrice(payload.price);
        setStatus("live");
        detailsEl.textContent = `Last update: ${new Date(payload.updatedAt).toLocaleTimeString()} • ${payload.source}`;
      } catch (error) {
        setStatus("error");
        detailsEl.textContent = error.message;
      }
    }

    function start() {
      if (started) {
        return;
      }
      started = true;
      refreshPrice();
      refreshTimer = setInterval(refreshPrice, 5000);
    }

    start();
  </script>
</body>
</html>
