<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>The Crease | Clean Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06090f;
      --card: #0f1724;
      --border: #1e293b;
      --text: #f8fafc;
      --muted: #64748b;
      --accent: #bef264;
      --win: #22c55e;
      --lose: #ef4444;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
    }

    /* --- ONE HEADER. ONE TARGET. NO GHOSTS. --- */
    .header-stack {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6, 9, 15, 0.98);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 20px 16px;
    }

    .header-flex {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 12px;
    }

    .score-block {
      min-width: 0;
      flex: 1 1 auto;
    }

    .score-block h1 { 
        margin: 0; 
        font-family: "JetBrains Mono", monospace; 
        font-size: clamp(1.15rem, 4.8vw, 1.45rem); 
        letter-spacing: -1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.1;
    }
    .score-block p { 
        margin: 4px 0 0 0;
        font-size: 0.8rem; 
        color: var(--muted); 
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(239, 68, 68, 0.1);
      color: var(--lose);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .live-indicator.card {
      padding: 4px 10px;
      font-size: 9px;
      justify-content: flex-end;
      align-self: flex-end;
    }
    .dot { width: 6px; height: 6px; background: var(--lose); border-radius: 50%; animation: blink 1.2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* --- Container --- */
    .container { padding: 16px; max-width: 500px; margin: 0 auto; }

    /* --- Prediction Area --- */
    .prediction-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
    }
    .card-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .card-title {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
      min-width: 0;
      flex: 1 1 auto;
    }
    .card-title span {
      color: var(--accent);
      margin-left: 4px;
      font-size: 9px;
      display: inline-block;
      vertical-align: middle;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .tile {
      height: 85px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .tile.active { border-color: var(--accent); background: rgba(190, 242, 100, 0.05); }
    .tile.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }
    .tile strong { font-size: 1.4rem; font-weight: 800; }
    .tile .label { font-size: 8px; color: var(--muted); text-transform: uppercase; margin: 2px 0; }
    .tile .odds { font-family: "JetBrains Mono"; font-size: 10px; color: var(--accent); }

    .wait-btn {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }

    .settlement {
      margin-top: 10px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }
    .settlement.win {
      color: var(--win);
      border-color: var(--win);
      background: rgba(34,197,94,0.10);
    }
    .settlement.lose {
      color: var(--lose);
      border-color: var(--lose);
      background: rgba(239,68,68,0.10);
    }

    /* --- Recent Balls --- */
    .strip {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 10px;
      margin-top: 10px;
      overflow: hidden;
    }
    .ball-circle {
      min-width: 42px;
      height: 42px;
      border-radius: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }
    .bnd { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    .feed-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
      padding-left: 18px;
      position: relative;
    }
    .feed-container::before {
      content: "";
      position: absolute;
      left: 20px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    .feed-item {
      display: flex;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .feed-over {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      color: var(--muted);
      width: 42px;
      flex: 0 0 auto;
    }
    .feed-item::before {
      content: "";
      position: absolute;
      left: -21px;
      top: 6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }
    .feed-text {
      min-width: 0;
      font-size: 14px;
      line-height: 1.4;
    }
    .feed-text b {
      display: block;
      margin-bottom: 2px;
      font-weight: 800;
    }
    .feed-text span {
      font-size: 11px;
      color: var(--muted);
    }
    .support-bar {
      margin: 18px 0 4px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 12px;
    }
    .support-bar .label {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }
    .support-bar a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 800;
      white-space: nowrap;
    }
    .support-bar a:active,
    .support-bar a:hover {
      text-decoration: underline;
    }
    .cta-row {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cta-tag {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .cta-tag strong {
      color: var(--text);
    }
    .cta-button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--accent);
      background: rgba(190, 242, 100, 0.08);
      color: var(--accent);
      text-decoration: none;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }
    .cta-button:active,
    .cta-button:hover {
      background: rgba(190, 242, 100, 0.14);
    }
  </style>
</head>
<body>

<header class="header-stack">
  <div class="header-flex">
    <div class="score-block">
      <h1 id="score-val">Waiting...</h1>
      <p id="context-val">Loading live score...</p>
    </div>
  </div>
</header>

<div class="container">
  <div class="prediction-card">
    <div class="card-header">
      <div class="card-title">Next Ball <span id="target-ball">--</span></div>
      <div class="card-meta">
        <div style="font-size: 10px; font-weight: 800;">
        W: <span id="w-count" style="color:var(--accent)">0</span> L: <span id="l-count" style="color:var(--lose)">0</span>
        </div>
        <div class="live-indicator card">
          <div class="dot"></div> Live
        </div>
      </div>
    </div>

    <div class="grid" id="main-grid">
      </div>

    <div class="wait-btn" id="lock-status">Waiting for update...</div>
    <div class="settlement" id="settlement-status">Settlement: waiting for result...</div>
  </div>

  <div style="font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 10px;">Recent commentary</div>
  <div class="strip" id="ball-strip"></div>
  <div class="feed-container" id="feed-container"></div>
  <div class="support-bar" aria-label="Support contact">
    <div>
      <div class="label">Support</div>
      <div>Need help? Message <span style="color: var(--text); font-weight: 800;">@Gellyop</span></div>
    </div>
    <a href="https://t.me/Gellyop" target="_blank" rel="noreferrer">Telegram</a>
  </div>
  <div class="cta-row">
    <div class="cta-tag">Want to support the game?</div>
    <a class="cta-button" id="solana-pay-button" href="#" target="_blank" rel="noreferrer" hidden>Solana Pay</a>
  </div>
</div>

<script>
  window.__APP_CONFIG__ = window.__APP_CONFIG__ || {};
</script>
<script>
  const dataMap = [
    {v:"0", l:"Dot", o:"1.8x"}, {v:"1", l:"Single", o:"2.5x"}, {v:"2", l:"Double", o:"8.0x"},
    {v:"4", l:"Four", o:"12x"}, {v:"6", l:"Six", o:"25x"}, {v:"OUT", l:"Wkt", o:"30x"},
    {v:"WD", l:"Wide", o:"15x"}, {v:"NB", l:"No Ball", o:"40x"}, {v:"3", l:"Triple", o:"50x"}
  ];

  function formatOverLabel(overValue) {
    if (overValue === null || overValue === undefined || overValue === "") {
      return "--";
    }

    const text = String(overValue);
    return text.includes(".") ? text : `${text}.0`;
  }

  function getOverKey(overValue) {
    if (overValue === null || overValue === undefined || overValue === "") {
      return "";
    }

    return String(overValue).split(".")[0];
  }

  function getTeamLabel(team) {
    return team?.team || team?.name || "TEAM";
  }

  function getTeamScore(team) {
    return team?.score || "--";
  }

  function getBallLabel(item) {
    const playType = String(item?.playType || "").toLowerCase();
    const text = String(item?.shortText || "").toUpperCase();

    if (playType.includes("out") || text.includes("OUT")) return "W";
    if (playType.includes("wide") || text.includes("WIDE")) return "WD";
    if (playType.includes("no ball") || text.includes("NO BALL")) return "NB";
    if (text.includes("SIX")) return "6";
    if (text.includes("FOUR")) return "4";

    const runMatch = text.match(/(\d+)\s+RUN/);
    if (runMatch) return runMatch[1];

    if (playType.includes("no run") || text.includes("NO RUN")) return "0";
    if (playType.includes("run")) return "1";
    return "0";
  }

  function logActivity(event, details = {}) {
    fetch("/activity-log", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ event, details }),
      keepalive: true,
    }).catch(() => {});
  }

  let currentSelectedPicks = [];
  const appConfig = window.__APP_CONFIG__ || {};

  function render() {
    document.getElementById("main-grid").innerHTML = dataMap.map((d) => `
      <div class="tile" data-val="${d.v}">
        <span class="label">${d.l}</span>
        <strong>${d.v}</strong>
        <span class="odds">${d.o}</span>
      </div>
    `).join("");

    document.getElementById("main-grid").addEventListener("click", (e) => {
      const t = e.target.closest(".tile");
      if (!t) return;
      const pick = t.dataset.val;
      if (currentSelectedPicks.includes(pick)) return;
      currentSelectedPicks = [...currentSelectedPicks, pick];
      t.classList.add("active");
      fetch("/pick", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ pick }),
      }).then(async (response) => {
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(payload.error || `Pick failed with status ${response.status}`);
        }
        logActivity("pick_click", { pick });
      }).catch((error) => {
        currentSelectedPicks = currentSelectedPicks.filter((value) => value !== pick);
        t.classList.remove("active");
        const settlement = document.getElementById("settlement-status");
        settlement.className = "settlement lose";
        settlement.textContent = error.message;
      });
    });
  }

  function setupSolanaPayButton() {
    const button = document.getElementById("solana-pay-button");
    const url = String(appConfig.solanaPayUrl || "").trim();
    const recipient = String(appConfig.solanaPayRecipient || "").trim();
    if (!button || !url) {
      if (!button || !recipient) {
        return;
      }

      button.hidden = false;
      button.href = `solana:${recipient}`;
      return;
    }

    button.hidden = false;
    button.href = url;
  }

  function applySnapshot(d) {
    const teamA = d.score?.[0];
    const teamB = d.score?.[1];
    const scoreVal = teamA ? `${getTeamLabel(teamA)} ${getTeamScore(teamA)}` : "Waiting...";
    const contextParts = [];
    if (teamB) {
      contextParts.push(`${getTeamLabel(teamB)} ${getTeamScore(teamB)}`);
    }

    document.getElementById("score-val").textContent = scoreVal;
    document.getElementById("context-val").textContent = contextParts.join(" • ") || "";
    document.getElementById("target-ball").textContent = d.game?.targetBallLabel || "--";
    document.getElementById("w-count").textContent = d.game?.wins ?? 0;
    document.getElementById("l-count").textContent = d.game?.losses ?? 0;
    currentSelectedPicks = Array.isArray(d.game?.selectedPicks) ? d.game.selectedPicks : [];
    document.querySelectorAll(".tile").forEach((tile) => {
      tile.classList.toggle("active", currentSelectedPicks.includes(tile.dataset.val));
    });

    const currentOverKey = getOverKey(d.latestOver ?? d.feed?.[0]?.over);
    const overFeed = (d.feed || []).filter((f) => getOverKey(f.over) === currentOverKey);

    document.getElementById("ball-strip").innerHTML = overFeed.slice(0, 8).map((f) => {
      const value = getBallLabel(f);
      const isBnd = value === "4" || value === "6";
      return `<div class="ball-circle ${isBnd ? "bnd" : ""}">${value}</div>`;
    }).join("");

    const settlement = document.getElementById("settlement-status");
    const lastResultType = d.game?.lastResultType || "neutral";
    if (currentSelectedPicks.length) {
      settlement.className = "settlement";
      settlement.textContent = `Settlement: selected ${currentSelectedPicks.join(", ")}`;
    } else {
      settlement.className = `settlement ${lastResultType === "win" ? "win" : lastResultType === "lose" ? "lose" : ""}`.trim();
      settlement.textContent = `Settlement: ${d.game?.lastResult || "waiting for result..."}`;
    }

    document.getElementById("feed-container").innerHTML = (d.feed || []).slice(0, 5).map((f) => `
      <div class="feed-item">
        <div class="feed-over">${f.over ?? ""}</div>
        <div class="feed-text">
          <b>${f.shortText || ""}</b>
          <span>${f.score || ""}</span>
        </div>
      </div>
    `).join("");
  }

  function connectStream() {
    const source = new EventSource("/events");
    source.addEventListener("snapshot", (event) => {
      try {
        applySnapshot(JSON.parse(event.data));
      } catch (error) {
        console.log(error);
      }
    });
    source.onerror = () => {
      if (source.readyState === EventSource.CLOSED) {
        setTimeout(connectStream, 1000);
      }
    };
    window.addEventListener("beforeunload", () => source.close(), { once: true });
  }

  render();
  setupSolanaPayButton();
  logActivity("page_load", {
    path: window.location.pathname,
  });
  connectStream();
</script>

</body>
</html>
