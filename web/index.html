<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>The Crease | Mobile Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06090f;
      --card: #0f1724;
      --border: #1e293b;
      --text: #f8fafc;
      --muted: #64748b;
      --accent: #bef264;
      --win: #22c55e;
      --lose: #ef4444;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
      line-height: 1.4;
      padding-bottom: 40px;
    }

    .header-stack {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(6, 9, 15, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }

    .mini-score {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .team-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .team-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 1.1rem;
      min-width: 0;
    }

    .team-row span {
      color: var(--muted);
      font-family: "Inter", sans-serif;
      font-size: 0.7rem;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .team-row strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 800;
      color: var(--lose);
      text-transform: uppercase;
      justify-content: flex-end;
    }

    .live-dot.ended {
      color: var(--muted);
    }

    .pulse {
      width: 6px;
      height: 6px;
      background: var(--lose);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    .pulse.ended {
      background: var(--muted);
      animation: none;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .container {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .result-banner {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(190, 242, 100, 0.08);
      border: 1px solid rgba(190, 242, 100, 0.3);
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    .result-banner.show {
      display: block;
    }

    .over-summary {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 8px 0 16px;
      scrollbar-width: none;
    }

    .ball {
      min-width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 13px;
    }

    .ball.wkt {
      background: var(--lose);
      border-color: var(--lose);
    }

    .ball.bnd {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 12px;
    }

    .label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .predict-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .btn-tile {
      height: 70px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.1s;
    }

    .btn-tile:active {
      transform: scale(0.95);
      background: var(--border);
    }

    .btn-tile.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 800;
    }

    .btn-tile:disabled,
    .btn-tile.disabled {
      opacity: 0.45;
      pointer-events: none;
    }

    .btn-tile small {
      font-size: 9px;
      opacity: 0.7;
      font-weight: 400;
      margin-top: 2px;
    }

    .status-toast {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      font-size: 13px;
      text-align: center;
    }

    .status-toast.win {
      color: var(--win);
      background: rgba(34,197,94,0.1);
      border: 1px solid var(--win);
    }

    .status-toast.lose {
      color: var(--lose);
      background: rgba(239,68,68,0.1);
      border: 1px solid var(--lose);
    }

    .feed-item {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .feed-over {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      color: var(--muted);
      min-width: 40px;
      flex: 0 0 auto;
    }

    .feed-body {
      min-width: 0;
    }

    .feed-body b {
      display: block;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .feed-body span {
      font-size: 12px;
      color: var(--muted);
    }

    @media (min-width: 768px) {
      .container {
        max-width: 800px;
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 24px;
      }

      .predict-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .header-stack {
        position: relative;
        border-radius: 20px;
        margin: 20px auto 0;
        max-width: 800px;
      }
    }
  </style>
</head>
<body>

<div class="header-stack">
  <div class="mini-score">
    <div class="team-info">
      <div class="team-row"><span id="team-a-name">TEAM A</span> <strong id="score-team-a">--</strong></div>
      <div class="team-row"><span id="team-b-name">TEAM B</span> <strong id="score-team-b">--</strong></div>
    </div>
    <div class="text-right">
      <div class="live-dot" id="live-state"><div class="pulse" id="live-pulse"></div><span id="live-text">Live</span></div>
      <div id="cur-over" style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; margin-top:4px;">Ov 0.0</div>
    </div>
  </div>
</div>

<div class="container">
  <section>
    <div class="result-banner" id="result-banner"></div>
    <section class="panel">
      <div class="panel-header">
        <span class="label">Predict Next Ball</span>
        <div style="font-size: 10px; font-weight: 800;">
          WINS: <span id="w-count" style="color:var(--accent)">0</span>
          &nbsp; LOSSES: <span id="l-count" style="color:var(--lose)">0</span>
        </div>
      </div>

      <div class="predict-grid" id="p-grid"></div>

      <div class="status-toast" id="p-toast">
        Make your move for the next delivery.
      </div>
      <div id="p-target" style="margin-top:10px; font-size:11px; color:var(--muted); text-align:center;">
        Target ball: waiting for live data...
      </div>
    </section>
  </section>

  <section>
    <span class="label" style="display:block; margin-bottom: 12px;">Recent Commentary</span>
    <div class="over-summary" id="over-strip"></div>
    <div id="feed-container"></div>
  </section>
</div>

<script>
  const buttons = [
    {v:"0", l:"Dot"}, {v:"1", l:"Single"}, {v:"2", l:"Double"},
    {v:"4", l:"Four"}, {v:"6", l:"Six"}, {v:"OUT", l:"Wicket"},
    {v:"WD", l:"Wide"}, {v:"NB", l:"No Ball"}, {v:"3", l:"Triple"}
  ];

  function setup() {
    const grid = document.getElementById("p-grid");
    grid.innerHTML = buttons.map((b) => `
      <div class="btn-tile" data-val="${b.v}">
        <strong>${b.v}</strong>
        <small>${b.l}</small>
      </div>
    `).join("");

    grid.addEventListener("click", (e) => {
      const btn = e.target.closest(".btn-tile");
      if (!btn) return;
      if (btn.classList.contains("disabled")) return;
      fetch("/pick", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ pick: btn.dataset.val }),
      }).then(async (response) => {
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(payload.error || `Pick failed with status ${response.status}`);
        }
        return sync();
      }).catch((error) => {
        const toast = document.getElementById("p-toast");
        toast.className = "status-toast lose";
        toast.textContent = error.message;
      });
    });
  }

  function getBallResult(item) {
    const t = String(item.shortText || "").toUpperCase();
    if (t.includes("OUT")) return "OUT";
    if (t.includes("SIX")) return "6";
    if (t.includes("FOUR")) return "4";
    if (t.includes("WIDE")) return "WD";
    if (t.includes("NO BALL")) return "NB";
    const r = t.match(/(\d+)\s+RUN/);
    return r ? r[1] : "0";
  }

  function getNextBallLabel(overValue) {
    if (overValue === null || overValue === undefined || overValue === "") {
      return "next ball";
    }

    const text = String(overValue);
    const parts = text.split(".");
    const over = Number.parseInt(parts[0] || "0", 10);
    const ball = Number.parseInt(parts[1] || "0", 10);

    if (!Number.isFinite(over) || !Number.isFinite(ball)) {
      return "next ball";
    }

    if (ball >= 6) {
      return `${over + 1}.1`;
    }

    return `${over}.${ball + 1}`;
  }

  function updateEndedState(data) {
    const ended = Boolean(data.completed || data.state === "post");

    const liveState = document.getElementById("live-state");
    const livePulse = document.getElementById("live-pulse");
    const liveText = document.getElementById("live-text");
    const resultBanner = document.getElementById("result-banner");

    liveState.classList.toggle("ended", ended);
    livePulse.classList.toggle("ended", ended);
    liveText.textContent = ended ? "Game ended" : "Live";

    if (ended) {
      resultBanner.className = "result-banner show";
      resultBanner.textContent = data.result || "Match ended.";
      document.getElementById("p-target").textContent = "Target ball: match finished";
      document.querySelectorAll(".btn-tile").forEach((x) => x.classList.add("disabled"));
    } else {
      resultBanner.className = "result-banner";
      resultBanner.textContent = "";
      document.querySelectorAll(".btn-tile").forEach((x) => x.classList.remove("disabled"));
    }
  }

  async function sync() {
    try {
      const r = await fetch("/score.json", { cache: "no-store" });
      const d = await r.json();
      const latest = d.feed?.[0];

      updateEndedState(d);

      const teamA = d.score?.[0];
      const teamB = d.score?.[1];
      document.getElementById("team-a-name").textContent = teamA?.team || "TEAM A";
      document.getElementById("team-b-name").textContent = teamB?.team || "TEAM B";
      document.getElementById("score-team-a").textContent = teamA?.score || "--";
      document.getElementById("score-team-b").textContent = teamB?.score || "--";
      document.getElementById("cur-over").textContent = `Ov ${d.latestOver || "0.0"}`;
      document.getElementById("w-count").textContent = d.game?.wins ?? 0;
      document.getElementById("l-count").textContent = d.game?.losses ?? 0;
      document.getElementById("p-target").textContent = `Target ball: ${d.game?.targetBallLabel || "waiting for live data..."}`;
      const toast = document.getElementById("p-toast");
      toast.className = `status-toast ${d.game?.lastResultType === "win" ? "win" : d.game?.lastResultType === "lose" ? "lose" : ""}`.trim();
      toast.textContent = d.game?.lastResult || "Make your move for the next delivery.";
      document.querySelectorAll(".btn-tile").forEach((x) => {
        x.classList.toggle("active", d.game?.pendingPick === x.dataset.val);
      });

      document.getElementById("over-strip").innerHTML = (d.feed || []).slice(0, 8).map((f) => {
        const res = getBallResult(f);
        let c = "ball";
        if (res === "OUT") c += " wkt";
        if (res === "4" || res === "6") c += " bnd";
        return `<div class="${c}">${res}</div>`;
      }).join("");

      document.getElementById("feed-container").innerHTML = (d.feed || []).slice(0, 5).map((f) => `
        <div class="feed-item">
          <div class="feed-over">${f.over}</div>
          <div class="feed-body">
            <b>${f.shortText || ""}</b>
            <span>${f.score || ""}</span>
          </div>
        </div>
      `).join("");

    } catch (e) {
      const toast = document.getElementById("p-toast");
      toast.className = "status-toast lose";
      toast.textContent = "Live sync failed. Check server feed.";
      console.log(e);
    }
  }

  setup();
  sync();
  setInterval(sync, 8000);
</script>

</body>
</html>
